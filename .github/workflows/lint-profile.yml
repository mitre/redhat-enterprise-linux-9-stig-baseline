name: Lint & Check the Profile

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CHEF_LICENSE: accept-silent
      CHEF_LICENSE_KEY: ${{ secrets.SAF_CHEF_LICENSE_KEY }}
      KITCHEN_LOCAL_YAML: kitchen.ec2.yml
      LC_ALL: "en_US.UTF-8"
    steps:
      - name: add needed packages
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Disable ri and rdoc
        run: 'echo "gem: --no-ri --no-rdoc" >> ~/.gemrc'

      - name: Diagnose rubygems.cinc.sh
        run: |
          echo "=== DNS ==="
          nslookup rubygems.cinc.sh || true

          echo "=== TCP/HTTPS ==="
          curl -Iv --connect-timeout 15 https://rubygems.cinc.sh/ || true

          echo "=== OpenSSL ==="
          openssl s_client -connect rubygems.cinc.sh:443 -servername rubygems.cinc.sh </dev/null || true

          echo "=== Bundler config ==="
          bundle config list || true

          echo "=== Source references ==="
          grep -R "rubygems.cinc.sh" Gemfile Gemfile.lock .bundle/ ~/.bundle/ || true


      - name: Run Bundle Install
        run: bundle install

      - name: Installed Inspec
        run: bundle exec inspec version

      - name: Vendor the Profile
        run: bundle exec inspec vendor . --overwrite

      - name: Check the Inspec profile
        run: bundle exec rake inspec:check

      - name: Lint the Profile
        run: bundle exec rake lint
