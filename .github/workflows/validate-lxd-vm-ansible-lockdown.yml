name: RHEL 9 LXD VM Testing Matrix

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate my profile
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      CHEF_LICENSE: accept-silent
      CHEF_LICENSE_KEY: ${{ secrets.SAF_CHEF_LICENSE_KEY }}
      KITCHEN_LOCAL_YAML: kitchen.lxd.yml
      PLATFORM: "rhel-9"
      LC_ALL: "en_US.UTF-8"
      LXD_VM_USERNAME: "rhel"
    strategy:
      matrix:
        suite: ["vanilla", "hardened"]
      fail-fast: false
    steps:
      - name: Install host packages
        run: sudo apt-get update && sudo apt-get -y install jq qemu-utils gdisk

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install and configure LXD
        run: sudo ./.github/scripts/setup-lxd.sh

      - name: Set short git commit SHA
        run: echo "COMMIT_SHORT_SHA=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

      - name: Setup Ruby
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005  # v1.99.0
        with:
          ruby-version: "3.1"

      - name: Install gems and vendor profile
        run: |
          bundle install
          bundle exec cinc-auditor vendor . --overwrite

      - name: Prepare SSH private key for Kitchen
        env:
          KITCHEN_SSH_PRIVATE_KEY: ${{ secrets.KITCHEN_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          KEY="$RUNNER_TEMP/kitchen_key"
          printf '%s\n' "$KITCHEN_SSH_PRIVATE_KEY" > "$KEY"
          chmod 600 "$KEY"
          echo "KITCHEN_SSH_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Download RHEL QCOW2 via Image Builder
        env:
          RH_SSO_CLIENT_ID: ${{ secrets.RH_SSO_CLIENT_ID }}
          RH_SSO_CLIENT_SECRET: ${{ secrets.RH_SSO_CLIENT_SECRET }}
          RH_COMPOSE_ID: ${{ secrets.RH_COMPOSE_ID }}
        run: ./.github/scripts/fetch-rhel-image.sh

      - name: Repackage QCOW2 with grown disk and fixed GPT for LXD
        run: |
          set -euo pipefail
          qemu-img convert -O raw rhel-image.qcow2 disk.raw
          qemu-img resize disk.raw +16M
          sgdisk -e disk.raw
          qemu-img convert -O qcow2 disk.raw disk.qcow2

      - name: Import image into LXD
        run: |
          set -euo pipefail
          cat > metadata.yaml <<EOF
          architecture: x86_64
          creation_date: $(date +%s)
          properties:
            description: "RHEL 9 Image Builder QCOW2"
            os: "rhel"
            release: "9"
          type: virtual-machine
          EOF
          tar -cf metadata.tar metadata.yaml
          lxc image import metadata.tar disk.qcow2 --alias rhel9-imagebuilder

      - name: Launch and wait for VM
        run: |
          set -euo pipefail
          NAME="${{ matrix.suite }}-${{ env.PLATFORM }}"
          lxc launch rhel9-imagebuilder "$NAME" --vm -c limits.memory=4GiB
          for i in $(seq 1 30); do
            lxc list --format=csv | grep -q "$NAME.*RUNNING" && break
            sleep 10
          done
          lxc list --format=csv | grep -q "$NAME.*RUNNING" || { echo "VM never reached RUNNING"; lxc info "$NAME"; exit 1; }

      - name: Export VM IPv4 for Kitchen
        run: |
          set -euo pipefail
          NAME="${{ matrix.suite }}-${{ env.PLATFORM }}"
          for i in $(seq 1 24); do
            ipv4=$(lxc list "$NAME" --format=json | jq -r '.[0].state.network | to_entries[] | .value.addresses[]? | select(.family=="inet" and .scope=="global") | .address' | head -n1)
            [ -n "$ipv4" ] && break
            sleep 5
          done
          [ -n "$ipv4" ] || { echo "No VM IPv4 found"; lxc info "$NAME"; exit 1; }
          echo "KITCHEN_HOST=$ipv4" >> "$GITHUB_ENV"

      - name: Run kitchen test
        run: bundle exec kitchen test --destroy=always ${{ matrix.suite }}-${{ env.PLATFORM }} || true

      - name: Save results summary JSON
        continue-on-error: true
        uses: mitre/saf_action@a19f76ed3721c14aa8a1afb8eded117d8bf16a5d  # v1.9.0
        with:
          command_string: "view summary -f json -i spec/results/${{ env.PLATFORM }}_${{ matrix.suite }}.json -o spec/results/${{ env.PLATFORM }}_${{ matrix.suite }}-data.json"

      - name: Upload Test Result JSON
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: ${{ env.PLATFORM }}_${{ matrix.suite }}.json
          path: spec/results/

      - name: Upload to Heimdall
        continue-on-error: true
        env:
          SAF_HEIMDALL_UPLOAD_KEY: ${{ secrets.SAF_HEIMDALL_UPLOAD_KEY }}
        run: |
          curl -# -s -F data=@spec/results/${{ env.PLATFORM }}_${{ matrix.suite }}.json \
            -F "filename=${{ env.PLATFORM }}_${{ matrix.suite }}-${{ env.COMMIT_SHORT_SHA }}.json" \
            -F "public=true" \
            -F "evaluationTags=${{ env.COMMIT_SHORT_SHA }},${{ github.repository }},${{ github.workflow }}" \
            -H "Authorization: Api-Key $SAF_HEIMDALL_UPLOAD_KEY" \
            "${{ vars.SAF_HEIMDALL_URL }}/evaluations"

      - name: Display results summary
        uses: mitre/saf_action@a19f76ed3721c14aa8a1afb8eded117d8bf16a5d  # v1.9.0
        with:
          command_string: "view summary -i spec/results/${{ env.PLATFORM }}_${{ matrix.suite }}.json"

      - name: Generate Markdown Summary
        continue-on-error: true
        id: generate-summary
        run: |
          cat spec/results/${{ env.PLATFORM }}_${{ matrix.suite }}-data.json | python markdown-summary.py > spec/results/${{ env.PLATFORM }}_${{ matrix.suite }}-markdown-summary.md
          cat spec/results/${{ env.PLATFORM }}_${{ matrix.suite }}-markdown-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Validate scan threshold
        uses: mitre/saf_action@a19f76ed3721c14aa8a1afb8eded117d8bf16a5d  # v1.9.0
        with:
          command_string: "validate threshold -i spec/results/${{ env.PLATFORM }}_${{ matrix.suite }}.json -F ${{ matrix.suite }}.threshold.yml"

      - name: Cleanup SSH private key
        if: always()
        run: rm -f "$RUNNER_TEMP/kitchen_key"
